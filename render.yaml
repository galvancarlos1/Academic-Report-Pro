services:
  - type: web
    name: academic-report-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "false"
